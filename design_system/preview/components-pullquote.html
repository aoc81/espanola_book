<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .quote { font-family: var(--font-serif); font-style: italic; font-size: 22px; line-height: 1.35; color: var(--ink-0); border-top: 3px double var(--ink-1); border-bottom: 3px double var(--ink-1); padding: 16px 0; margin: 0; }
  .quote::before { content: "“"; font-family: var(--font-display); font-style: normal; color: var(--classified); font-weight: 700; font-size: 32px; margin-right: 4px; vertical-align: -4px; }
  .attrib { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-3); margin-top: 12px; }
</style></head>
<body>
<div class="card">
  <div class="grain"></div>
  <blockquote class="quote">We were a firm before we were a unit. The patches changed. The men did not.</blockquote>
  <div class="attrib">— "SKIF", QUOTED IN INTERCEPTED RADIO TRANSMISSION · 14.02.2024</div>
</div>
</body></html>
