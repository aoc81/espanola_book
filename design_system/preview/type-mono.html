<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .block { padding: 12px 14px; }
  .block.dossier { background: #14110d; color: #ece4d2; }
  .block.paper { background: var(--paper-1); border: 1px solid var(--paper-edge); }
  .label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.6; margin-bottom: 8px; }
  .typewriter { font-family: var(--font-mono); font-size: 13px; line-height: 1.55; }
  .data { font-family: var(--font-data); font-size: 12px; letter-spacing: 0.04em; line-height: 1.7; }
  .row { display: flex; justify-content: space-between; }
</style></head>
<body>
<div class="card">
  <div class="grain"></div>
  <div class="grid">
    <div class="block dossier">
      <div class="label">Mono · Special Elite</div>
      <div class="typewriter">
        FILE: E-1127/23<br>
        CASE ID: UKR-ESP-17<br>
        SUBJECT: VOLUNTEERS /<br>
        UNIDADES DE ASALTO<br>
        STATUS: <span style="color:#b81d13">ACTIVE</span>
      </div>
    </div>
    <div class="block paper">
      <div class="label">Data · JetBrains Mono</div>
      <div class="data">
        <div class="row"><span>LAT</span><span>48.3794° N</span></div>
        <div class="row"><span>LON</span><span>31.1656° E</span></div>
        <div class="row"><span>GRID</span><span>36T WN 448 763</span></div>
        <div class="row"><span>DATE</span><span>14.02.2024</span></div>
        <div class="row"><span>SRC</span><span>HUMINT / OSINT</span></div>
      </div>
    </div>
  </div>
</div>
</body></html>
