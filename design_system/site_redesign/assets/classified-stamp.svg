<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <filter id="distress">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="2" seed="5"></feTurbulence>
      <feDisplacementMap in="SourceGraphic" scale="2"></feDisplacementMap>
    </filter>
  </defs>
  <g filter="url(#distress)">
    <rect x="6" y="6" width="228" height="48" fill="none" stroke="#b81d13" stroke-width="3"></rect>
    <rect x="12" y="12" width="216" height="36" fill="none" stroke="#b81d13" stroke-width="1"></rect>
  </g>
  <text x="120" y="38" text-anchor="middle" font-family="Oswald, Impact, sans-serif" font-weight="700" font-size="22" letter-spacing="6" fill="#b81d13">CLASSIFIED</text>
</svg>