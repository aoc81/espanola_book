<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .palette { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .swatch { height: 96px; padding: 10px 12px; display: flex; flex-direction: column; justify-content: space-between; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #f5f1ea; }
  .name { font-family: var(--font-display); font-weight: 700; font-size: 13px; letter-spacing: 0.18em; }
  .hex { opacity: 0.85; }
  .role { font-size: 9px; opacity: 0.75; line-height: 1.4; }
</style></head>
<body>
<div class="card">
  <div class="grain"></div>
  <div class="palette">
    <div class="swatch" style="background:#b81d13;">
      <div class="name">CLASSIFIED</div>
      <div><div class="hex">#b81d13</div><div class="role">stamps · eyebrow · marks</div></div>
    </div>
    <div class="swatch" style="background:#7a1209;">
      <div class="name">CLASSIFIED-DEEP</div>
      <div><div class="hex">#7a1209</div><div class="role">link · aged accent</div></div>
    </div>
    <div class="swatch" style="background:#d94c2a;">
      <div class="name">FLARE</div>
      <div><div class="hex">#d94c2a</div><div class="role">pyro · once per article</div></div>
    </div>
    <div class="swatch" style="background:#4a5a35;">
      <div class="name">FIELD</div>
      <div><div class="hex">#4a5a35</div><div class="role">map · uniform · data</div></div>
    </div>
    <div class="swatch" style="background:#2a3a4a;">
      <div class="name">MAP-BLUE</div>
      <div><div class="hex">#2a3a4a</div><div class="role">blueprint · diagrams</div></div>
    </div>
    <div class="swatch" style="background:#c8a64a; color:#0d0c0a;">
      <div class="name">HIGHLIGHTER</div>
      <div><div class="hex">#c8a64a</div><div class="role">archival yellow · annotation</div></div>
    </div>
  </div>
</div>
</body></html>
