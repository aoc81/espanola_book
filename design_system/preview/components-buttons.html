<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row { display: flex; gap: 14px; align-items: stretch; }
  /* Paper buttons */
  .btn { font-family: var(--font-display); font-weight: 600; text-transform: uppercase; letter-spacing: 0.18em; font-size: 12px; padding: 12px 20px; border-radius: 0; cursor: pointer; transition: all 200ms cubic-bezier(0.2,0.7,0.1,1); }
  .btn-primary { background: var(--ink-0); color: var(--paper-0); border: 1px solid var(--ink-0); }
  .btn-secondary { background: transparent; color: var(--ink-0); border: 1px solid var(--ink-0); }
  .btn-stamp { background: transparent; color: var(--classified); border: 2px solid var(--classified); transform: rotate(-2deg); }
  .btn-link { background: transparent; color: var(--ink-1); border: none; padding: 12px 0; border-bottom: 2px solid var(--ink-1); border-radius: 0; }
  .group { display:flex; flex-direction:column; gap:8px; align-items:flex-start; }
  .lbl { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); }
</style></head>
<body>
<div class="card">
  <div class="grain"></div>
  <div class="row">
    <div class="group"><div class="lbl">primary</div><button class="btn btn-primary">Read the file</button></div>
    <div class="group"><div class="lbl">secondary</div><button class="btn btn-secondary">Sources</button></div>
    <div class="group"><div class="lbl">stamp</div><button class="btn btn-stamp">CLASSIFIED</button></div>
    <div class="group"><div class="lbl">link</div><button class="btn btn-link">Continue reading</button></div>
  </div>
</div>
</body></html>
