<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row { display:flex; align-items:flex-end; gap: 14px; }
  .step { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .bar { background: var(--ink-1); width: 28px; }
  .lbl { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); }
  .px { font-family: var(--font-data); font-size: 10px; color: var(--ink-2); }
</style></head>
<body>
<div class="card">
  <div class="grain"></div>
  <div class="row">
    <div class="step"><div class="bar" style="height:4px"></div><div class="lbl">space-1</div><div class="px">4</div></div>
    <div class="step"><div class="bar" style="height:8px"></div><div class="lbl">space-2</div><div class="px">8</div></div>
    <div class="step"><div class="bar" style="height:12px"></div><div class="lbl">space-3</div><div class="px">12</div></div>
    <div class="step"><div class="bar" style="height:16px"></div><div class="lbl">space-4</div><div class="px">16</div></div>
    <div class="step"><div class="bar" style="height:24px"></div><div class="lbl">space-5</div><div class="px">24</div></div>
    <div class="step"><div class="bar" style="height:32px"></div><div class="lbl">space-6</div><div class="px">32</div></div>
    <div class="step"><div class="bar" style="height:48px"></div><div class="lbl">space-7</div><div class="px">48</div></div>
    <div class="step"><div class="bar" style="height:64px"></div><div class="lbl">space-8</div><div class="px">64</div></div>
    <div class="step"><div class="bar" style="height:96px"></div><div class="lbl">space-9</div><div class="px">96</div></div>
  </div>
</div>
</body></html>
