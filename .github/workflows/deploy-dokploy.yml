name: Deploy to Dokploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dokploy-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Verify site build
        working-directory: site
        run: |
          npm ci
          npm run build

      - name: Trigger Dokploy compose deployment
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
        run: |
          if [ -z "$DOKPLOY_URL" ] || [ -z "$DOKPLOY_API_KEY" ] || [ -z "$DOKPLOY_COMPOSE_ID" ]; then
            echo "Missing one or more required secrets: DOKPLOY_URL, DOKPLOY_API_KEY, DOKPLOY_COMPOSE_ID"
            exit 1
          fi

          dokploy_url="${DOKPLOY_URL%/}"
          payload=$(printf '{"composeId":"%s","title":"GitHub Actions deploy","description":"Commit %s"}' "$DOKPLOY_COMPOSE_ID" "$GITHUB_SHA")

          curl -fsS --retry 3 --retry-delay 5 \
            -X POST "$dokploy_url/api/compose.deploy" \
            -H "Content-Type: application/json" \
            -H "x-api-key: $DOKPLOY_API_KEY" \
            -d "$payload"
