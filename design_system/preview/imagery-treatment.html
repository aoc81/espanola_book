<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .frame { position: relative; height: 220px; overflow: hidden; }
  .frame img { width: 100%; height: 100%; object-fit: cover; object-position: center 28%; filter: grayscale(1) contrast(1.1) sepia(0.18); }
  .gradient { position:absolute; inset: 0; background: linear-gradient(to bottom, rgba(10,9,7,0.0) 30%, rgba(10,9,7,0.85) 100%); }
  .stamp-layer { position:absolute; top: 14px; right: 18px; font-family: var(--font-display); font-weight: 700; font-size: 11px; letter-spacing: 0.2em; padding: 4px 8px 3px; color: #b81d13; border: 2px solid #b81d13; transform: rotate(4deg); background: rgba(245,241,234,0.05); }
  .caption { position:absolute; bottom: 10px; left: 14px; right: 14px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; color: #ece4d2; line-height: 1.45; }
  .caption b { color: #b81d13; font-family: var(--font-display); font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; margin-right: 8px; font-size: 10px; }
</style></head>
<body>
<div class="card" style="padding:0;">
  <div class="frame">
    <img src="../assets/cover-hero.png" alt="">
    <div class="gradient"></div>
    <div class="stamp-layer">EVIDENCE 04</div>
    <div class="caption"><b>FIG. 1</b>A volunteer with the Española formation, identified by call-sign "Skif." Imagery treated b/w + warm sepia. Protection gradient ensures legibility of the caption strip.</div>
  </div>
</div>
</body></html>
