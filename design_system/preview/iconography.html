<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 14px 18px; align-items: center; }
  .ic { display:flex; flex-direction:column; align-items:center; gap:6px; color: var(--ink-1); }
  .ic svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .lbl { font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); }
  .glyphs { display:flex; gap: 18px; padding-top: 10px; border-top: 1px solid var(--paper-edge); margin-top: 12px; }
  .gly { font-family: var(--font-serif); font-size: 26px; color: var(--ink-0); }
  .gly small { display:block; font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.14em; color: var(--ink-3); text-transform: uppercase; margin-top: 2px; }
</style></head>
<body>
<div class="card">
  <div class="grain"></div>
  <div class="grid">
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg><span class="lbl">menu</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><span class="lbl">search</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg><span class="lbl">file</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M12 2v20M2 12h20"/></svg><span class="lbl">add</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="10" r="3"/><path d="M12 22s8-7 8-13a8 8 0 1 0-16 0c0 6 8 13 8 13z"/></svg><span class="lbl">map-pin</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M12 22s-8-4.5-8-12V5l8-3 8 3v5c0 7.5-8 12-8 12z"/></svg><span class="lbl">shield</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span class="lbl">clock</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg><span class="lbl">arrow</span></div>
  </div>
  <div class="glyphs">
    <div class="gly">№<small>numero</small></div>
    <div class="gly">§<small>section</small></div>
    <div class="gly">¶<small>pilcrow</small></div>
    <div class="gly">†<small>dagger</small></div>
    <div class="gly">‡<small>doubledag</small></div>
    <div class="gly">✦<small>marker</small></div>
  </div>
</div>
</body></html>
